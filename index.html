
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Link Generator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    width:350px;
    text-align:center;
}
input{
    width:90%;
    padding:10px;
    margin:10px 0;
}
button{
    padding:10px 20px;
    cursor:pointer;
}
#generatedLink{
    margin-top:15px;
    word-break:break-all;
}
</style>

</head>
<body>

<div class="container">
    <h2>Admin Link Generator</h2>

    <input type="text" id="adminCode" placeholder="Enter Admin Code">

    <button onclick="generateLink()">Generate Link</button>

    <div id="generatedLink"></div>

    <hr>

    <h3>URL Reader</h3>
    <p id="result">No admin code detected.</p>
</div>

<script>
function generateLink() {
    const code = document.getElementById("adminCode").value.trim();

    if (!code) {
        alert("Enter an admin code");
        return;
    }

    const link =
        window.location.origin +
        window.location.pathname +
        "?admin=" +
        encodeURIComponent(code);

    document.getElementById("generatedLink").innerHTML =
        '<a href="' + link + '">' + link + '</a>';
}

// Read the admin parameter
const params = new URLSearchParams(window.location.search);
const admin = params.get("admin");

if (admin) {
    document.getElementById("result").textContent =
        "Admin Code Found: " + admin;
}
</script>

</body>
</html>
